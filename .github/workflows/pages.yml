name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static data
        run: |
          mkdir -p frontend/data
          cp backend/data/metadata.json frontend/data/metadata.json
          cp backend/data/training_history.json frontend/data/training_history.json
          cp backend/data/country_coords.json frontend/data/country_coords.json
          cp backend/data/embedding_3d.json frontend/data/embedding_3d.json
          cp backend/data/recon_*.png frontend/data/

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
